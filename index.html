<!DOCTYPE html>
<html>
<head>
  <title>Sinus LED 3D FULL</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ================= SCENE =================
const scene = new THREE.Scene();

// ================= CAMERA =================
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(10,6,18);

// ================= RENDERER =================
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);

// ================= CONTROL =================
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ================= LIGHT =================
const light = new THREE.PointLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);

// ================= BOARD =================
const board = new THREE.Mesh(
  new THREE.BoxGeometry(22,12,0.5),
  new THREE.MeshPhongMaterial({ color:0x050505 })
);
board.position.x = 3;
scene.add(board);

// ================= GRID TITIK =================
for(let x=-8; x<=12; x+=0.5){
  for(let y=-5; y<=5; y+=0.5){
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(0.05),
      new THREE.MeshBasicMaterial({ color:0x222222 })
    );
    dot.position.set(x,y,0.26);
    scene.add(dot);
  }
}

// ================= LED =================
function createLED(x,y,color){
  const group = new THREE.Group();

  const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.12),
    new THREE.MeshStandardMaterial({
      color: color,
      emissive: color,
      emissiveIntensity: 1
    })
  );

  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(0.3),
    new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.25
    })
  );

  core.position.set(x,y,0.35);
  glow.position.set(x,y,0.35);

  group.add(core, glow);
  return group;
}

// ================= GROUP =================
const sinusGroup = new THREE.Group();
const ampGroup = new THREE.Group();
const perGroup = new THREE.Group();
const verGroup = new THREE.Group();
const horGroup = new THREE.Group();

scene.add(sinusGroup, ampGroup, perGroup, verGroup, horGroup);

// ================= PARAMETER =================
let A=4, B=1, C=0, D=0;
let t = 0;

// ================= SINUS ANIMASI =================
function updateSinus(){
  sinusGroup.clear();

  for(let x=0; x<=Math.PI; x+=0.2){
    let px = x*3 - 5;
    let py = A * Math.sin(B*x + C + t) + D;
    sinusGroup.add(createLED(px,py,0xffffff));
  }
}

// ================= AMPLITUDO =================
for(let y=0; y<=4; y+=0.3){
  ampGroup.add(createLED(-5,y,0xff0000));
}

// ================= PERIODE =================
for(let x=0; x<=Math.PI; x+=0.2){
  perGroup.add(createLED(x*3-5,-3,0xffff00));
}

// ================= VERTIKAL =================
for(let y=-4; y<=4; y+=0.3){
  verGroup.add(createLED(0,y,0x00ff00));
}

// ================= HORIZONTAL =================
for(let x=0; x<=Math.PI; x+=0.2){
  horGroup.add(createLED(x*3-5,0,0x00aaff));
}

// ================= DEFAULT OFF =================
sinusGroup.visible=false;
ampGroup.visible=false;
perGroup.visible=false;
verGroup.visible=false;
horGroup.visible=false;

// ================= SAKLAR 3D =================
const switches = [];

function createSwitch(y, color, group){
  const btn = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4,0.4,0.3,32),
    new THREE.MeshStandardMaterial({ color:0x333333 })
  );

  btn.rotation.x = Math.PI/2;
  btn.position.set(-6,y,0.5);

  btn.userData = {
    group: group,
    active: false,
    color: color
  };

  scene.add(btn);
  switches.push(btn);
}

// POSISI SESUAI ALAT
createSwitch(3, 0xffffff, sinusGroup);
createSwitch(1.5, 0xff0000, ampGroup);
createSwitch(0, 0xffff00, perGroup);
createSwitch(-1.5, 0x00ff00, verGroup);
createSwitch(-3, 0x00aaff, horGroup);

// ================= CLICK DETECT =================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('click', (event)=>{
  mouse.x = (event.clientX / window.innerWidth)*2 -1;
  mouse.y = -(event.clientY / window.innerHeight)*2 +1;

  raycaster.setFromCamera(mouse,camera);

  const hit = raycaster.intersectObjects(switches);

  if(hit.length>0){
    const obj = hit[0].object;
    const data = obj.userData;

    data.active = !data.active;
    data.group.visible = data.active;

    obj.material.color.set(
      data.active ? data.color : 0x333333
    );

    // efek ditekan
    obj.position.z = data.active ? 0.3 : 0.5;
  }
});

// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);

  t += 0.05;

  if(sinusGroup.visible){
    updateSinus();
  }

  controls.update();
  renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
